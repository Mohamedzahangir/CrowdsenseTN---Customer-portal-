<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
  <title>CrowdSense TN - Public Transport platform</title>
  <link rel="icon" type="image/png" href="/logo.png" />
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Leaflet CSS & JS CDN -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Fonts & Material Symbols -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  
  <!-- Shared Theme Setup -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "background": "#f8f9ff",
            "on-tertiary-fixed-variant": "#7d2d00",
            "secondary": "#565e74",
            "on-primary-container": "#eeefff",
            "on-error-container": "#93000a",
            "primary-container": "#2563eb",
            "outline-variant": "#c3c6d7",
            "on-background": "#0b1c30",
            "surface-container-highest": "#d3e4fe",
            "tertiary-fixed-dim": "#ffb596",
            "on-primary": "#ffffff",
            "on-tertiary-fixed": "#360f00",
            "on-error": "#ffffff",
            "on-secondary": "#ffffff",
            "primary-fixed": "#dbe1ff",
            "error": "#ba1a1a",
            "on-primary-fixed": "#00174b",
            "tertiary-fixed": "#ffdbcd",
            "on-surface": "#0b1c30",
            "on-secondary-fixed": "#131b2e",
            "error-container": "#ffdad6",
            "on-primary-fixed-variant": "#003ea8",
            "surface-bright": "#f8f9ff",
            "on-tertiary-container": "#ffede6",
            "outline": "#737686",
            "on-secondary-container": "#5c647a",
            "secondary-fixed": "#dae2fd",
            "surface-tint": "#0053db",
            "inverse-primary": "#b4c5ff",
            "tertiary-container": "#bc4800",
            "primary-fixed-dim": "#b4c5ff",
            "surface-container-high": "#dce9ff",
            "surface-container": "#e5eeff",
            "surface-variant": "#d3e4fe",
            "primary": "#004ac6",
            "secondary-container": "#dae2fd",
            "surface-dim": "#cbdbf5",
            "on-surface-variant": "#434655",
            "inverse-surface": "#213145",
            "tertiary": "#943700",
            "surface-container-low": "#eff4ff",
            "on-secondary-fixed-variant": "#3f465c"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "margin-desktop": "40px",
            "margin-mobile": "16px",
            "gutter": "24px",
            "container-max": "1440px",
            "unit": "4px"
          },
          "fontFamily": {
            "title-lg": ["Inter"],
            "label-caps": ["Inter"],
            "body-md": ["Inter"],
            "display-lg": ["Inter"],
            "body-sm": ["Inter"],
            "headline-md": ["Inter"],
            "display-lg-mobile": ["Inter"]
          },
          "fontSize": {
            "title-lg": ["18px", {"lineHeight": "28px", "fontWeight": "600"}],
            "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "display-lg-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
  
  <!-- Custom Overrides & Timelines -->
  <link rel="stylesheet" href="/src/css/styles.css">
</head>
<body class="bg-background text-on-background min-h-screen pb-32">

  <!-- Main Dynamic View Container -->
  <div id="app-content"></div>

  <!-- Persistent Bottom Navigation Bar -->
  <nav id="app-navbar" class="fixed bottom-0 w-full rounded-t-xl z-50 bg-surface/80 backdrop-blur-xl dark:bg-surface-dim/80 border-t border-outline-variant/10 shadow-[0_-10px_25px_-5px_rgba(37,99,235,0.1)] flex justify-around items-center h-20 pb-safe px-2 hidden">
    <a href="#/home" id="nav-home" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 active:scale-90 transition-all duration-150 rounded-xl px-4 py-1">
      <span class="material-symbols-outlined">home</span>
      <span class="font-label-caps text-label-caps mt-1">Home</span>
    </a>
    <a href="#/map" id="nav-map" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 active:scale-90 transition-all duration-150 rounded-xl px-4 py-1">
      <span class="material-symbols-outlined">map</span>
      <span class="font-label-caps text-label-caps mt-1">Live Map</span>
    </a>
    <a href="#/alerts" id="nav-alerts" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 active:scale-90 transition-all duration-150 rounded-xl px-4 py-1">
      <span class="material-symbols-outlined">notifications</span>
      <span class="font-label-caps text-label-caps mt-1">Alerts</span>
    </a>
    <a href="#/profile" id="nav-profile" class="flex flex-col items-center justify-center text-on-surface-variant dark:text-secondary-fixed-dim opacity-70 hover:opacity-100 active:scale-90 transition-all duration-150 rounded-xl px-4 py-1">
      <span class="material-symbols-outlined">person</span>
      <span class="font-label-caps text-label-caps mt-1">Profile</span>
    </a>
  </nav>

  <!-- Entry Script -->
  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
